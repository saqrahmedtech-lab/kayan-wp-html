<!-- Investor Financial Statements Section - Standalone for Financial Statements page -->
<!-- Shortcode: [kyan_investor_financial_statements] -->

<div class="kyan-investor-dashboard-wrapper kyan-investor-financial-statements-section">
<style>
.kyan-investor-financial-statements-section { all: initial; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif !important; display: block !important; box-sizing: border-box !important; position: relative !important; isolation: isolate; width: 100% !important; margin: 0 !important; padding: 0 !important; }
.kyan-investor-financial-statements-section *,.kyan-investor-financial-statements-section *::before,.kyan-investor-financial-statements-section *::after { box-sizing: border-box !important; }
.kyan-investor-financial-statements-section .dashboard-main { flex: 1; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.08); overflow: hidden; display: flex; flex-direction: column; }
.kyan-investor-financial-statements-section .dashboard-header { background: linear-gradient(135deg, #2c5f7c 0%, #1e4a5f 100%); color: #fff; padding: 32px 40px; border-radius: 16px 16px 0 0; }
.kyan-investor-financial-statements-section .page-title { font-size: 26px; font-weight: 600; margin: 0; }
.kyan-investor-financial-statements-section .dashboard-content { padding: 36px 40px; flex: 1; }
.kyan-investor-financial-statements-section .search-section { margin-bottom: 32px; }
.kyan-investor-financial-statements-section .search-container { position: relative; display: flex; align-items: center; max-width: 100%; }
.kyan-investor-financial-statements-section .search-input { width: 100%; padding: 12px 16px 12px 45px; border: 2px solid #e8ecef; border-radius: 12px; font-size: 14px; background: #fff; }
.kyan-investor-financial-statements-section .search-input:focus { outline: none; border-color: #4a90e2; box-shadow: 0 0 0 3px rgba(74,144,226,.1); }
.kyan-investor-financial-statements-section .search-icon { position: absolute; left: 14px; font-size: 18px; color: #6c757d; pointer-events: none; }
.kyan-investor-financial-statements-section .reports-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; }
.kyan-investor-financial-statements-section .report-card { background: #fff; border-radius: 12px; padding: 18px 24px; display: flex; align-items: center; gap: 18px; box-shadow: 0 2px 8px rgba(0,0,0,.06); border: 1px solid #e8ecef; transition: transform .2s ease, box-shadow .2s ease; }
.kyan-investor-financial-statements-section .report-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.12); }
.kyan-investor-financial-statements-section .report-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #a8e6cf 0%, #88d8c0 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.kyan-investor-financial-statements-section .report-info { flex: 1; min-width: 0; }
.kyan-investor-financial-statements-section .report-title { font-size: 17px; font-weight: 600; color: #1a4d5e; margin: 0 0 6px 0; }
.kyan-investor-financial-statements-section .report-description { font-size: 13px; color: #6c757d; margin: 0 0 8px 0; }
.kyan-investor-financial-statements-section .report-meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.kyan-investor-financial-statements-section .report-date { font-size: 13px; color: #6c757d; }
.kyan-investor-financial-statements-section .download-btn { display: flex; align-items: center; gap: 8px; padding: 10px 18px; background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .3s ease; white-space: nowrap; flex-shrink: 0; }
.kyan-investor-financial-statements-section .download-btn:hover { background: linear-gradient(135deg, #357abd 0%, #2a5f8f 100%); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,144,226,.3); }
.kyan-investor-financial-statements-section .download-icon { font-size: 16px; }
@media (max-width: 768px) {
    .kyan-investor-financial-statements-section .dashboard-header { padding: 20px 24px !important; }
    .kyan-investor-financial-statements-section .page-title { font-size: 20px !important; }
    .kyan-investor-financial-statements-section .dashboard-content { padding: 24px 20px !important; }
    .kyan-investor-financial-statements-section .reports-grid { grid-template-columns: 1fr !important; }
    .kyan-investor-financial-statements-section .report-card { flex-direction: column !important; align-items: flex-start !important; gap: 16px !important; }
    .kyan-investor-financial-statements-section .download-btn { width: 100% !important; justify-content: center !important; }
}
</style>
<main class="dashboard-main">
    <header class="dashboard-header">
        <h1 class="page-title">Financial Statements and Disclosures</h1>
    </header>
    <div class="dashboard-content">
        <section class="search-section">
            <div class="search-container">
                <span class="search-icon">&#128269;</span>
                <input type="search" class="search-input" placeholder="Search" aria-label="Search" id="kyan-fs-search">
            </div>
        </section>
        <section class="reports-grid-section">
            <div class="reports-grid" id="kyan-fs-list">
                <div class="report-card">
                    <div class="report-icon">&#128196;</div>
                    <div class="report-info">
                        <h3 class="report-title">Balance Sheet Q3 2024</h3>
                        <p class="report-description">Financial Statement</p>
                        <div class="report-meta"><span class="report-date">&#128197; 15-10-2025</span></div>
                    </div>
                    <button type="button" class="download-btn" data-pdf-url="#" aria-label="Download Balance Sheet Q3 2024"><span class="download-icon">&#11015;</span> Download</button>
                </div>
                <div class="report-card">
                    <div class="report-icon">&#128196;</div>
                    <div class="report-info">
                        <h3 class="report-title">Cash Flow Statement Q3 2024</h3>
                        <p class="report-description">Financial Statement</p>
                        <div class="report-meta"><span class="report-date">&#128197; 15-10-2025</span></div>
                    </div>
                    <button type="button" class="download-btn" data-pdf-url="#" aria-label="Download Cash Flow Statement Q3 2024"><span class="download-icon">&#11015;</span> Download</button>
                </div>
                <div class="report-card">
                    <div class="report-icon">&#128196;</div>
                    <div class="report-info">
                        <h3 class="report-title">Material Disclosure - Merger Agreement</h3>
                        <p class="report-description">Disclosure</p>
                        <div class="report-meta"><span class="report-date">&#128197; 15-10-2025</span></div>
                    </div>
                    <button type="button" class="download-btn" data-pdf-url="#" aria-label="Download Material Disclosure"><span class="download-icon">&#11015;</span> Download</button>
                </div>
                <div class="report-card">
                    <div class="report-icon">&#128196;</div>
                    <div class="report-info">
                        <h3 class="report-title">External Audit Report 2024</h3>
                        <p class="report-description">Audit Report</p>
                        <div class="report-meta"><span class="report-date">&#128197; 15-10-2025</span></div>
                    </div>
                    <button type="button" class="download-btn" data-pdf-url="#" aria-label="Download External Audit Report 2024"><span class="download-icon">&#11015;</span> Download</button>
                </div>
            </div>
        </section>
    </div>
</main>
<script>
(function(){ var w=document.querySelector('.kyan-investor-financial-statements-section'); if(!w) return; var s=w.querySelector('#kyan-fs-search'), l=w.querySelector('#kyan-fs-list'); if(s&&l){ s.addEventListener('input',function(){ var q=(this.value||'').toLowerCase(); l.querySelectorAll('.report-card').forEach(function(c){ var t=(c.querySelector('.report-title')&&c.querySelector('.report-title').textContent)||'', d=(c.querySelector('.report-description')&&c.querySelector('.report-description').textContent)||''; c.style.display=!q||t.toLowerCase().indexOf(q)>=0||d.toLowerCase().indexOf(q)>=0?'':'none'; }); }); } w.querySelectorAll('.download-btn').forEach(function(btn){ btn.addEventListener('click',function(){ var u=this.getAttribute('data-pdf-url'); if(u&&u!=='#') window.open(u,'_blank'); else alert('Download link will be updated.'); }); }); })();
</script>
</div>
